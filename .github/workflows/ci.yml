name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build and Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: trig-egamma-frame
          environment-file: environment.yml

      - name: Build Package
        shell: bash -l {0}
        run: |
          # The environment is already created and activated by setup-miniconda
          # We run make build to install the package in editable mode
          make build

  test-import:
    name: Test Import
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: trig-egamma-frame
          environment-file: environment.yml
      
      - name: Run Import Test
        shell: bash -l {0}
        run: |
          python tests/ci_test.py

  test-collect:
    name: Test Data Collection
    needs: test-import
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: trig-egamma-frame
          environment-file: environment.yml

      - name: Run Data Collection Test
        shell: bash -l {0}
        run: |
          python tests/data_collect.py
