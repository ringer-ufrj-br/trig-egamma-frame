        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: trig-egamma-frame
          environment-file: environment.yml
          cache-environment: true

      - name: Install Package
        shell: bash -l {0}
        run: |
          make build

      - name: Run Test
        shell: bash -l {0}
        run: |
          python tests/test_run2_event_loop.py

