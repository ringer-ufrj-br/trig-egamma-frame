name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build and Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Micromamba
        uses: mambaorg/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: trig-egamma-frame
          cache-environment: true
          cache-downloads: true

      - name: Install Package
        run: |
          # micromamba activate is handled by the action, 
          # but we run make build as requested.
          # Note: make build uses activate.sh which expects 'conda'.
          # setup-micromamba provides 'conda' wrapper.
          make build

  test-import:
    name: Test Import
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Micromamba
        uses: mambaorg/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: trig-egamma-frame
          cache-environment: true
      
      - name: Run Import Test
        shell: bash -l {0}
        run: |
          python tests/ci_test.py

  test-collect:
    name: Test Data Collection
    needs: test-import
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Micromamba
        uses: mambaorg/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: trig-egamma-frame
          cache-environment: true

      - name: Run Data Collection Test
        shell: bash -l {0}
        run: |
          python tests/data_collect.py
