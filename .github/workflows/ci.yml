name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-import:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
        # Note: If some dependencies require ROOT, this test might fail 
        # unless ROOT is installed in the runner.
        # But for a basic import test of the common parts, it might pass.

    - name: Verify Import
      run: |
        python -c "import trig_egamma_frame; print('Successfully imported trig_egamma_frame')"
